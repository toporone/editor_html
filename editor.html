<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Java Lite Editor - Tailwind</title>

  <!-- Tailwind CDN: HTML単体で使える。学校PCがオフラインならローカルビルド版CSSに差し替え推奨。 -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            code: ['Consolas', '"Courier New"', 'monospace'],
          }
        }
      },
      plugins: [
        function ({ addVariant }) {
          addVariant("light", ["body.light &", "body.light&"]);
        }
      ]
    };
  </script>

  <style>
    :root {
      --editor-bg: #0f1117;
      --line-bg: #161922;
      --text: #e8eaf0;
      --muted: #9aa3b2;
      --border: #2c3240;
      --syntax-keyword: #ff7b72;
      --syntax-type: #79c0ff;
      --syntax-string: #a5d6ff;
      --syntax-number: #d2a8ff;
      --syntax-comment: #8b949e;
      --syntax-plain: var(--text);
    }

    body.light {
      background: #f4f6fb;
      color: #20242c;
      color-scheme: light;
      --editor-bg: #ffffff;
      --line-bg: #f0f3f8;
      --text: #20242c;
      --muted: #667085;
      --border: #d7deea;
      --syntax-keyword: #cf222e;
      --syntax-type: #0550ae;
      --syntax-string: #0a3069;
      --syntax-number: #8250df;
      --syntax-comment: #6e7781;
      --syntax-plain: var(--text);
    }

    #lineNumbers {
      width: 54px;
      padding: 14px 8px;
      background: var(--line-bg);
      color: var(--muted);
      text-align: right;
      font-family: Consolas, "Courier New", monospace;
      font-size: 15px;
      line-height: 1.55;
      user-select: none;
      overflow: hidden;
      white-space: pre;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    .editor-stage {
      position: relative;
      flex: 1;
      min-width: 0;
      min-height: 0;
      background: var(--editor-bg);
    }

    #highlightLayer,
    #editor {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      margin: 0;
      border: none;
      padding: 14px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 15px;
      line-height: 1.55;
      tab-size: 4;
      white-space: pre;
    }

    #highlightLayer {
      pointer-events: none;
      overflow: hidden;
      color: var(--syntax-plain);
      background: var(--editor-bg);
    }

    #highlightCode {
      display: block;
      min-width: max-content;
      font-family: inherit;
    }

    #editor {
      resize: none;
      outline: none;
      overflow: auto;
      background: transparent;
      color: transparent;
      caret-color: var(--text);
      z-index: 2;
    }

    #editor::selection {
      background: rgba(122, 162, 255, .35);
    }

    .tok-keyword { color: var(--syntax-keyword); font-weight: 600; }
    .tok-type { color: var(--syntax-type); }
    .tok-string { color: var(--syntax-string); }
    .tok-number { color: var(--syntax-number); }
    .tok-comment { color: var(--syntax-comment); font-style: italic; }

    #settingsBackdrop {
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
    }

    body.settings-open #settingsBackdrop {
      opacity: 1;
      pointer-events: auto;
    }

    aside {
      transform: translateX(calc(100% + 24px));
      transition: transform .22s ease;
    }

    body.settings-open aside {
      transform: translateX(0);
    }

  </style>
</head>

<body class="light min-h-screen bg-[#111318] text-[#e8eaf0] font-sans transition-colors light:bg-[#f4f6fb] light:text-[#20242c]">
  <header class="relative flex h-[58px] items-center justify-between overflow-hidden border-b border-[#242a35] bg-[#181b22] px-[18px] light:border-[#e5e7eb] light:bg-white">
    <div class="z-10 flex flex-col gap-0.5">
      <strong class="text-[15px]">Java Lite Editor</strong>
    
    </div>

    <div class="z-10 flex items-center gap-5">
      <button id="newBtn" class="border-b border-transparent px-0.5 py-1 text-[13px] text-[#c9d1d9] transition hover:border-[#7aa2ff] hover:text-white light:text-[#344054] light:hover:text-[#111827]">新規</button>
      <button id="openBtn" class="border-b border-transparent px-0.5 py-1 text-[13px] text-[#c9d1d9] transition hover:border-[#7aa2ff] hover:text-white light:text-[#344054] light:hover:text-[#111827]">開く</button>
      <button id="copyBtn" class="border-b border-transparent px-0.5 py-1 text-[13px] text-[#c9d1d9] transition hover:border-[#7aa2ff] hover:text-white light:text-[#344054] light:hover:text-[#111827]">コピー</button>
      <button id="downloadBtn" class="border-b border-transparent px-0.5 py-1 text-[13px] text-[#c9d1d9] transition hover:border-[#7aa2ff] hover:text-white light:text-[#344054] light:hover:text-[#111827]">保存先を指定</button>
      <button id="settingsBtn" class="border-b border-transparent px-0.5 py-1 text-[13px] text-[#c9d1d9] transition hover:border-[#7aa2ff] hover:text-white light:text-[#344054] light:hover:text-[#111827]">設定</button>
    </div>
  </header>

  <div id="settingsBackdrop" class="fixed inset-0 z-20 bg-black/25"></div>

  <main class="grid h-[calc(100vh-88px)] grid-cols-1 gap-3.5 px-3.5 pb-3.5 pt-2.5">
    <section class="flex min-w-0 flex-col overflow-hidden rounded-xl bg-[var(--editor-bg)] shadow-[0_0_0_1px_rgba(255,255,255,0.04)] light:shadow-[0_0_0_1px_rgba(0,0,0,0.06)]">
      <div class="flex items-center justify-between border-b border-[#242a35] bg-[#181b22] px-3 py-2.5 text-xs text-[#9aa3b2] light:border-[#edf2f7] light:bg-white light:text-[#667085]">
        <span id="fileName">Main.java</span>
        <span>Java / Plain Text</span>
      </div>

      <div class="flex min-h-0 flex-1">
        <div id="lineNumbers">1</div>
        <div class="editor-stage">
          <pre id="highlightLayer" aria-hidden="true"><code id="highlightCode"></code></pre>
          <textarea id="editor" spellcheck="false">public class Main {
    public static void main(String[] args) {
        System.out.println("Hello Java");
    }
}</textarea>
        </div>
      </div>

      <div class="flex h-[30px] items-center justify-between border-t border-[#242a35] bg-[#181b22] px-3 text-xs text-[#9aa3b2] light:border-[#edf2f7] light:bg-white light:text-[#667085]">
        <span id="cursorStatus">Ln 1, Col 1</span>
        <span id="saveStatus">自動保存: 有効</span>
      </div>
    </section>

    <aside aria-hidden="true" class="fixed bottom-3.5 right-3.5 top-[72px] z-30 w-[min(320px,calc(100vw-28px))] overflow-auto rounded-2xl bg-[#181b22] p-4 shadow-2xl ring-1 ring-white/5 light:bg-white light:ring-black/10">
      <div class="mb-3 flex items-center justify-between gap-2">
        <h2 class="text-[15px] font-semibold">設定</h2>
        <button id="settingsCloseBtn" class="border-b border-transparent px-0.5 py-1 text-[13px] text-[#c9d1d9] hover:border-[#7aa2ff] hover:text-white light:text-[#344054] light:hover:text-[#111827]">閉じる</button>
      </div>

      <div class="border-t-0 py-3">
        <p class="mb-2 text-xs text-[#9aa3b2] light:text-[#667085]">表示設定</p>

        <label class="mb-2.5 flex flex-col gap-1.5 text-[13px]">テーマ
          <select id="themeSelect" class="rounded-xl border border-[#2c3240] bg-[#20242d] px-3 py-2 light:border-[#d7deea] light:bg-[#edf1f7]">
            <option value="dark">ダーク</option>
            <option value="light">ライト</option>
          </select>
        </label>

        <label class="mb-2.5 flex flex-col gap-1.5 text-[13px]">フォント
          <select id="fontSelect" class="rounded-xl border border-[#2c3240] bg-[#20242d] px-3 py-2 light:border-[#d7deea] light:bg-[#edf1f7]">
            <option value="Consolas, 'Courier New', monospace">Consolas</option>
            <option value="'Cascadia Code', Consolas, monospace">Cascadia Code</option>
            <option value="'MS Gothic', monospace">MS Gothic</option>
            <option value="monospace">monospace</option>
          </select>
        </label>

        <label class="mb-2.5 flex flex-col gap-1.5 text-[13px]">文字サイズ
          <select id="fontSizeSelect" class="rounded-xl border border-[#2c3240] bg-[#20242d] px-3 py-2 light:border-[#d7deea] light:bg-[#edf1f7]">
            <option value="14">14px</option>
            <option value="15" selected>15px</option>
            <option value="16">16px</option>
            <option value="18">18px</option>
          </select>
        </label>
      </div>

      <div class="border-t border-white/10 py-3 light:border-black/10">
        <p class="mb-2 text-xs text-[#9aa3b2] light:text-[#667085]">詳細設定</p>
        <label class="inline-flex cursor-pointer select-none items-center gap-2 border-b border-transparent px-0.5 py-1 text-[13px] text-[#c9d1d9] hover:border-[#7aa2ff] light:text-[#344054]">
          <input type="checkbox" id="zenkakuCheck" class="accent-[#7aa2ff]"> 全角記号を検知
        </label>
        <br><br>
        <label class="inline-flex cursor-pointer select-none items-center gap-2 border-b border-transparent px-0.5 py-1 text-[13px] text-[#c9d1d9] hover:border-[#7aa2ff] light:text-[#344054]">
          <input type="checkbox" id="bracketCheck" class="accent-[#7aa2ff]"> 括弧数だけ確認
        </label>
      </div>

      <div class="border-t border-white/10 py-3 light:border-black/10">
        <p class="mb-2 text-xs text-[#9aa3b2] light:text-[#667085]">提出前チェック</p>
        <button id="checkBtn" class="border-b border-transparent px-0.5 py-1 text-[13px] text-[#c9d1d9] hover:border-[#7aa2ff] hover:text-white light:text-[#344054] light:hover:text-[#111827]">確認する</button>
        <div id="checkResult" class="mt-2.5 min-h-[84px] whitespace-pre-wrap border-l border-white/10 bg-transparent py-2 pl-3 text-xs text-[#9aa3b2] light:border-black/10 light:text-[#667085]">補助機能は控えめです。必要なときだけ確認できます。</div>
      </div>
    </aside>
  </main>

  <script>
    const editor = document.getElementById("editor");
    const highlightLayer = document.getElementById("highlightLayer");
    const highlightCode = document.getElementById("highlightCode");
    const lineNumbers = document.getElementById("lineNumbers");
    const cursorStatus = document.getElementById("cursorStatus");
    const saveStatus = document.getElementById("saveStatus");
    const fileName = document.getElementById("fileName");
    const themeSelect = document.getElementById("themeSelect");
    const fontSelect = document.getElementById("fontSelect");
    const fontSizeSelect = document.getElementById("fontSizeSelect");
    const checkResult = document.getElementById("checkResult");
    const zenkakuCheck = document.getElementById("zenkakuCheck");
    const bracketCheck = document.getElementById("bracketCheck");
    const settingsBtn = document.getElementById("settingsBtn");
    const settingsCloseBtn = document.getElementById("settingsCloseBtn");
    const settingsBackdrop = document.getElementById("settingsBackdrop");

    const STORAGE_KEY = "java-lite-editor-tailwind-code";
    const DEFAULT_FILE_NAME = "Main.java";
    const FILE_PICKER_TYPES = [
      {
        description: "Java / Text files",
        accept: {
          "text/plain": [".java", ".txt"]
        }
      }
    ];
    let currentFileName = DEFAULT_FILE_NAME;
    let statusTimer = null;

    const javaKeywords = new Set([
      "abstract", "assert", "boolean", "break", "byte", "case", "catch", "char",
      "class", "const", "continue", "default", "do", "double", "else", "enum",
      "extends", "final", "finally", "float", "for", "goto", "if", "implements",
      "import", "instanceof", "int", "interface", "long", "native", "new", "package",
      "private", "protected", "public", "return", "short", "static", "strictfp", "super",
      "switch", "synchronized", "this", "throw", "throws", "transient", "try", "void",
      "volatile", "while", "var", "record", "sealed", "permits", "yield"
    ]);

    const javaTypes = new Set([
      "String", "System", "Scanner", "Math", "Integer", "Double", "Long", "Boolean",
      "Character", "Object", "ArrayList", "List", "Map", "HashMap", "Set", "HashSet", "Arrays"
    ]);

    function isIdStart(ch) {
      if (!ch) return false;
      const code = ch.charCodeAt(0);
      return ch === "_" || ch === "$" || (code >= 65 && code <= 90) || (code >= 97 && code <= 122);
    }

    function isIdPart(ch) {
      if (!ch) return false;
      const code = ch.charCodeAt(0);
      return isIdStart(ch) || (code >= 48 && code <= 57);
    }

    function isDigit(ch) {
      if (!ch) return false;
      const code = ch.charCodeAt(0);
      return code >= 48 && code <= 57;
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function span(cls, value) {
      return `<span class="${cls}">${escapeHtml(value)}</span>`;
    }

    function highlightJava(code) {
      let result = "";
      let i = 0;

      while (i < code.length) {
        const ch = code[i];
        const next = code[i + 1];

        if (ch === "/" && next === "/") {
          const start = i;
          i += 2;
          while (i < code.length && code.charCodeAt(i) !== 10) i++;
          result += span("tok-comment", code.slice(start, i));
          continue;
        }

        if (ch === "/" && next === "*") {
          const start = i;
          i += 2;
          while (i < code.length && !(code[i] === "*" && code[i + 1] === "/")) i++;
          i = Math.min(i + 2, code.length);
          result += span("tok-comment", code.slice(start, i));
          continue;
        }

        if (ch === '"' || ch === "'") {
          const quote = ch;
          const start = i;
          i++;
          while (i < code.length) {
            if (code.charCodeAt(i) === 92) {
              i += 2;
              continue;
            }
            if (code[i] === quote) {
              i++;
              break;
            }
            i++;
          }
          result += span("tok-string", code.slice(start, i));
          continue;
        }

        if (isDigit(ch)) {
          const start = i;
          i++;
          while (i < code.length && (isDigit(code[i]) || code[i] === ".")) i++;
          result += span("tok-number", code.slice(start, i));
          continue;
        }

        if (isIdStart(ch)) {
          const start = i;
          i++;
          while (i < code.length && isIdPart(code[i])) i++;
          const word = code.slice(start, i);
          if (javaKeywords.has(word)) {
            result += span("tok-keyword", word);
          } else if (javaTypes.has(word)) {
            result += span("tok-type", word);
          } else {
            result += escapeHtml(word);
          }
          continue;
        }

        result += escapeHtml(ch);
        i++;
      }

      return result || " ";
    }

    function updateHighlight() {
      highlightCode.innerHTML = highlightJava(editor.value);
      syncHighlightScroll();
    }

    function syncHighlightScroll() {
      highlightCode.style.transform = `translate(${-editor.scrollLeft}px, ${-editor.scrollTop}px)`;
    }

    function syncEditorView() {
      updateLineNumbers();
      updateCursor();
      updateHighlight();
    }

    function updateLineNumbers() {
      const count = editor.value.split("\n").length;
      lineNumbers.textContent = Array.from({ length: count }, (_, i) => i + 1).join("\n");
    }

    function updateCursor() {
      const pos = editor.selectionStart;
      const before = editor.value.slice(0, pos).split("\n");
      const line = before.length;
      const col = before[before.length - 1].length + 1;
      cursorStatus.textContent = `Ln ${line}, Col ${col}`;
    }

    function saveLocal() {
      localStorage.setItem(STORAGE_KEY, editor.value);
      showStatus("自動保存: 保存済み");
    }

    function showStatus(message, resetMessage = "自動保存: 有効", delay = 900) {
      if (statusTimer) clearTimeout(statusTimer);
      saveStatus.textContent = message;
      statusTimer = setTimeout(() => {
        saveStatus.textContent = resetMessage;
        statusTimer = null;
      }, delay);
    }

    function setCurrentFileName(name) {
      currentFileName = name || DEFAULT_FILE_NAME;
      fileName.textContent = currentFileName;
    }

    function isPickerSecurityError(error) {
      return error && error.name === "SecurityError";
    }

    function downloadWithFallback(name) {
      const blob = new Blob([editor.value], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name || DEFAULT_FILE_NAME;
      a.click();
      URL.revokeObjectURL(url);
    }

    function openWithFallback() {
      return new Promise((resolve, reject) => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".java,.txt,text/plain";
        input.style.display = "none";
        document.body.appendChild(input);

        let finished = false;
        const finish = (value) => {
          if (finished) return;
          finished = true;
          input.remove();
          resolve(value);
        };

        input.addEventListener("change", () => {
          const file = input.files && input.files[0];
          if (!file) {
            finish(null);
            return;
          }

          const reader = new FileReader();
          reader.addEventListener("load", () => {
            finish({ name: file.name, text: String(reader.result || "") });
          });
          reader.addEventListener("error", () => {
            finished = true;
            input.remove();
            reject(reader.error);
          });
          reader.readAsText(file);
        }, { once: true });
        input.addEventListener("cancel", () => finish(null), { once: true });

        input.click();
      });
    }

    async function openFile() {
      try {
        let openedFile = null;

        if (typeof window.showOpenFilePicker === "function") {
          try {
            const [handle] = await window.showOpenFilePicker({
              multiple: false,
              types: FILE_PICKER_TYPES,
              excludeAcceptAllOption: false
            });
            const file = await handle.getFile();
            openedFile = {
              name: file.name,
              text: await file.text()
            };
          } catch (error) {
            if (error && error.name === "AbortError") return;
            if (!isPickerSecurityError(error)) throw error;
          }
        }

        if (!openedFile) {
          openedFile = await openWithFallback();
        }

        if (!openedFile) return;

        editor.value = openedFile.text;
        setCurrentFileName(openedFile.name);
        syncEditorView();
        saveLocal();
        showStatus(`${openedFile.name} を開きました`, "自動保存: 有効", 1200);
      } catch (error) {
        if (error && error.name === "AbortError") return;
        console.error(error);
        showStatus("ファイルを開けませんでした", "自動保存: 有効", 1600);
      }
    }

    async function saveToFile() {
      try {
        if (typeof window.showSaveFilePicker === "function") {
          try {
            const handle = await window.showSaveFilePicker({
              suggestedName: currentFileName || DEFAULT_FILE_NAME,
              types: FILE_PICKER_TYPES,
              excludeAcceptAllOption: false
            });
            const writable = await handle.createWritable();
            await writable.write(editor.value);
            await writable.close();
            setCurrentFileName(handle.name || currentFileName);
            showStatus(`${currentFileName} に保存しました`, "自動保存: 有効", 1200);
            return;
          } catch (error) {
            if (error && error.name === "AbortError") return;
            if (!isPickerSecurityError(error)) throw error;
          }
        }

        downloadWithFallback(currentFileName);
        showStatus("保存しました", "自動保存: 有効", 1200);
      } catch (error) {
        if (error && error.name === "AbortError") return;
        console.error(error);
        showStatus("保存できませんでした", "自動保存: 有効", 1600);
      }
    }

    function applyFont() {
      editor.style.fontFamily = fontSelect.value;
      highlightLayer.style.fontFamily = fontSelect.value;
      highlightCode.style.fontFamily = fontSelect.value;
      lineNumbers.style.fontFamily = fontSelect.value;
      localStorage.setItem("java-lite-font", fontSelect.value);
    }

    function applyFontSize() {
      editor.style.fontSize = fontSizeSelect.value + "px";
      highlightLayer.style.fontSize = fontSizeSelect.value + "px";
      lineNumbers.style.fontSize = fontSizeSelect.value + "px";
      localStorage.setItem("java-lite-font-size", fontSizeSelect.value);
    }

    function runChecks() {
      const code = editor.value;
      const messages = [];

      if (zenkakuCheck.checked) {
        const lines = code.split("\n");
        lines.forEach((line, index) => {
          if (/[　；（）｛｝［］]/.test(line)) {
            messages.push(`⚠ ${index + 1}行目: 全角スペースまたは全角記号の可能性`);
          }
        });
      }

      if (bracketCheck.checked) {
        const pairs = [
          ["{", "}"],
          ["(", ")"],
          ["[", "]"]
        ];
        pairs.forEach(([open, close]) => {
          const openCount = [...code].filter(c => c === open).length;
          const closeCount = [...code].filter(c => c === close).length;
          if (openCount !== closeCount) {
            messages.push(`⚠ ${open} ${close} の数が一致していません`);
          }
        });
      }

      checkResult.textContent = messages.length ? messages.join("\n") : "問題は見つかりませんでした。";
      checkResult.classList.toggle("text-[#ffd166]", messages.length > 0);
    }

    editor.addEventListener("input", () => {
      syncEditorView();
      saveLocal();
    });

    editor.addEventListener("click", updateCursor);
    editor.addEventListener("keyup", updateCursor);
    editor.addEventListener("scroll", syncHighlightScroll);

    editor.addEventListener("keydown", (e) => {
      if (e.key === "Tab") {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.slice(0, start) + "    " + editor.value.slice(end);
        editor.selectionStart = editor.selectionEnd = start + 4;
        syncEditorView();
        saveLocal();
      }
    });

    document.getElementById("openBtn").addEventListener("click", openFile);

    document.getElementById("newBtn").addEventListener("click", () => {
      editor.value = "";
      setCurrentFileName(DEFAULT_FILE_NAME);
      syncEditorView();
      saveLocal();
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      await navigator.clipboard.writeText(editor.value);
      showStatus("コピーしました");
    });

    document.getElementById("downloadBtn").addEventListener("click", saveToFile);

    themeSelect.addEventListener("change", () => {
      const isLight = themeSelect.value === "light";
      document.body.classList.toggle("light", isLight);
      localStorage.setItem("java-lite-theme", themeSelect.value);
    });

    fontSelect.addEventListener("change", applyFont);
    fontSizeSelect.addEventListener("change", applyFontSize);
    document.getElementById("checkBtn").addEventListener("click", runChecks);

    function openSettings() {
      document.body.classList.add("settings-open");
      document.querySelector("aside").setAttribute("aria-hidden", "false");
    }

    function closeSettings() {
      document.body.classList.remove("settings-open");
      document.querySelector("aside").setAttribute("aria-hidden", "true");
    }

    settingsBtn.addEventListener("click", openSettings);
    settingsCloseBtn.addEventListener("click", closeSettings);
    settingsBackdrop.addEventListener("click", closeSettings);

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeSettings();
    });


    window.addEventListener("load", () => {
      const savedCode = localStorage.getItem(STORAGE_KEY);
      if (savedCode !== null) editor.value = savedCode;

      const savedTheme = localStorage.getItem("java-lite-theme") || "light";
      themeSelect.value = savedTheme;
      document.body.classList.toggle("light", savedTheme === "light");

      const savedFont = localStorage.getItem("java-lite-font");
      if (savedFont) fontSelect.value = savedFont;

      const savedFontSize = localStorage.getItem("java-lite-font-size");
      if (savedFontSize) fontSizeSelect.value = savedFontSize;


      applyFont();
      applyFontSize();
      syncEditorView();
    });
  </script>
</body>
</html>
